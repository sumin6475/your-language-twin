        src: url("fonts/InterVariable.woff2") format("woff2-variations");
        font-weight: 100 900;
        font-style: normal;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,

        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0b;
      }
      body {
        font-family: "Inter", sans-serif;

      #v-landing,
      #v-upload,
      #v-results {
        position: absolute;
        left: 180px;
        top: 75px;
        width: 1560px;
        height: auto;
        border-radius: 20px;
      }
      #v-sumin {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        filter: saturate(0.82) brightness(0.97) contrast(1.02);
      }
      #v-vision {
        position: absolute;
        left: 1110px;
        top: 110px;
        width: 720px;
        height: auto;
        border-radius: 18px;
      }
    </style>
  </head>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* footage fades & moves, synced to the sub-composition choreography */
      tl.fromTo("#v-landing", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "sine.out" }, 22.0);
      tl.fromTo("#v-results", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "sine.inOut" }, 64.0);
      tl.to("#v-results", { opacity: 0, duration: 0.45, ease: "sine.in" }, 71.55);
      tl.fromTo("#v-sumin", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "sine.out" }, 79.6);
      tl.fromTo("#v-sumin", { scale: 1.04 }, { scale: 1.0, duration: 4.6, ease: "sine.out", transformOrigin: "50% 40%" }, 79.8);
      tl.to("#v-sumin", { x: -252, duration: 0.7, ease: "power3.inOut" }, 84.5);
      tl.to("#v-sumin", { opacity: 0.35, duration: 1.6, ease: "sine.inOut" }, 96.0);
      tl.fromTo("#v-vision", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "sine.out" }, 141.0);
      tl.to("#v-vision", { opacity: 0, duration: 0.8, ease: "power2.in" }, 148.4);

      window.__timelines["main"] = tl;
