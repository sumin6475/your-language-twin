            <path class="b2-arrow-line" id="b2-r2-a" d="M8 16 H 96 M 84 6 L 100 16 L 84 26" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="b2-right" id="b2-r2-r">Answer</span>

        <div class="b2-row" id="b2-r3">
          <span class="b2-left" id="b2-r3-l">Story</span>

            <path class="b2-arrow-line" id="b2-r3-a" d="M8 16 H 96 M 84 6 L 100 16 L 84 26" stroke="#3B82F6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

    <style>
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-500.woff2") format("woff2"); font-weight: 500; font-style: normal; }
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-600.woff2") format("woff2"); font-weight: 600; font-style: normal; }
      @font-face { font-family: "Inter"; src: url("fonts/InterVariable.woff2") format("woff2-variations"); font-weight: 100 900; font-style: normal; }
      #b2-root { position: absolute; inset: 0; background: #0A0A0B; overflow: hidden; }
      #b2-root .b2-stage { position: absolute; inset: 0; }
      #b2-root .b2-glow { position: absolute; left: -320px; bottom: -380px; width: 1100px; height: 800px; background: radial-gradient(closest-side, rgba(30,64,175,0.18), rgba(10,10,11,0)); }
      #b2-root .b2-stack { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 54px; padding: 0 200px; }
      #b2-root .b2-row { display: flex; align-items: center; gap: 38px; }
      #b2-root .b2-left { font-family: "Clash Display", sans-serif; font-weight: 600; font-size: 66px; letter-spacing: -0.02em; color: #FFFFFF; min-width: 380px; text-align: right; }
      #b2-root .b2-right { font-family: "Clash Display", sans-serif; font-weight: 600; font-size: 66px; letter-spacing: -0.02em; color: #3B82F6; min-width: 380px; text-align: left; }
      #b2-root .b2-arrow { width: 120px; height: 32px; flex-shrink: 0; overflow: visible; }
      #b2-root .b2-subtitle { margin-top: 26px; font-family: "Clash Display", sans-serif; font-weight: 500; font-size: 34px; letter-spacing: -0.01em; color: #d7d7dc; }
      #b2-root .b2-bloom { position: absolute; left: 50%; top: 50%; width: 900px; height: 900px; transform: translate(-50%, -50%); border-radius: 50%; background: radial-gradient(closest-side, rgba(59,130,246,0.5), rgba(10,10,11,0)); opacity: 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        /* three springy word pairs — left snaps, arrow draws, right pops */
        const rows = [
          { l: "#b2-r1-l", a: "#b2-r1-a", r: "#b2-r1-r", t: 0.55 },
          { l: "#b2-r2-l", a: "#b2-r2-a", r: "#b2-r2-r", t: 2.05 },
          { l: "#b2-r3-l", a: "#b2-r3-a", r: "#b2-r3-r", t: 3.55 },
        ];
        rows.forEach((row) => {
          tl.fromTo(row.l, { opacity: 0, scale: 0.8, y: 8 }, { opacity: 1, scale: 1, y: 0, duration: 0.42, ease: "back.out(1.2)", transformOrigin: "50% 70%" }, row.t);
          tl.fromTo(row.a, { strokeDasharray: 160, strokeDashoffset: 160, opacity: 0 }, { strokeDashoffset: 0, opacity: 1, duration: 0.4, ease: "power2.inOut" }, row.t + 0.5);
          tl.fromTo(row.r, { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.46, ease: "back.out(1.4)", transformOrigin: "0% 70%" }, row.t + 0.72);
        });

        /* subtitle owns the frame — pairs dim */
        tl.fromTo("#b2-subtitle", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 5.9);
        tl.to(["#b2-r1", "#b2-r2", "#b2-r3"], { opacity: 0.38, duration: 0.6, ease: "sine.inOut" }, 5.9);

        /* designed hand-off: stack collapses toward centre, the blue lingers */
        tl.to("#b2-stack", { scale: 0.9, opacity: 0, duration: 1.0, ease: "power2.in", transformOrigin: "50% 50%" }, 9.15);
        tl.fromTo("#b2-bloom", { opacity: 0, scale: 0.5 }, { opacity: 0.85, scale: 1.15, duration: 1.15, ease: "power2.inOut" }, 9.1);
        tl.to("#b2-bloom", { opacity: 0, duration: 0.15, ease: "sine.out" }, 10.25);

        window.__timelines["b2"] = tl;
      })();
    </script>
  </div>
</template>
