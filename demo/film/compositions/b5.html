<template id="b5-template">
  <div id="b5-root" data-composition-id="b5" data-width="1920" data-height="1080">
    <div class="b5-stage" id="b5-stage">

      <!-- left: the learner (silent founder footage, cool grade) -->
      <div class="b5-left" id="b5-left">
        <div class="b5-left-inner" id="b5-left-inner">
          <div class="b5-grade"></div>
          <div class="b5-scrim"></div>
        </div>
        <div class="b5-wf b5-wf-left" id="b5-wfl"></div>
      </div>

      <!-- right: the creator side — the app's own avatar + waveform -->
      <div class="b5-right" id="b5-right">
        <div class="b5-right-aurora"></div>
        <div class="b5-right-col">
          <div class="b5-avatar" id="b5-avatar">
            <svg viewBox="0 0 48 48" fill="none">
              <rect x="10" y="18" width="5" height="12" rx="2.5" fill="#fff" opacity="0.9"/>
              <rect x="21.5" y="12" width="5" height="24" rx="2.5" fill="#fff"/>
              <rect x="33" y="20" width="5" height="8" rx="2.5" fill="#fff" opacity="0.9"/>
            </svg>
          </div>
          <div class="b5-wf b5-wf-right" id="b5-wfr"></div>
        </div>
      </div>

      <!-- centre split line -->
      <div class="b5-splitline" id="b5-splitline"></div>

      <!-- the two lines, centred on the split -->
      <div class="b5-lines">
        <div class="b5-line" id="b5-line1">They don't use the same <span class="b5-hl" id="b5-hl1">words</span>.</div>
        <div class="b5-line" id="b5-line2">They use the same <span class="b5-hl" id="b5-hl2">way of thinking</span>.</div>
      </div>

      <!-- merge pulse -->
      <div class="b5-pulse" id="b5-pulse"></div>
    </div>

    <style>
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-500.woff2") format("woff2"); font-weight: 500; font-style: normal; }
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-600.woff2") format("woff2"); font-weight: 600; font-style: normal; }
      @font-face { font-family: "Inter"; src: url("fonts/InterVariable.woff2") format("woff2-variations"); font-weight: 100 900; font-style: normal; }
      #b5-root { position: absolute; inset: 0; background: transparent; overflow: hidden; }
      #b5-root .b5-stage { position: absolute; inset: 0; }
      #b5-root .b5-left { position: absolute; inset: 0; overflow: hidden; }
      #b5-root .b5-left-inner { position: absolute; inset: 0; }
      #b5-root .b5-grade { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(30,64,175,0.10), rgba(10,10,11,0.05)); }
      #b5-root .b5-scrim { position: absolute; left: 0; right: 0; bottom: 0; height: 320px; background: linear-gradient(rgba(10,10,11,0), rgba(10,10,11,0.55)); }
      #b5-root .b5-right { position: absolute; inset: 0; background: #FAFAFB; clip-path: inset(0 0 0 100%); }
      #b5-root .b5-right-aurora { position: absolute; inset: -10px; opacity: 0.5; filter: blur(12px); background: radial-gradient(ellipse at 78% 12%, rgba(59,130,246,0.35), rgba(250,250,251,0) 60%), radial-gradient(ellipse at 92% 60%, rgba(169,192,255,0.45), rgba(250,250,251,0) 55%); }
      #b5-root .b5-right-col { position: absolute; left: 50%; top: 0; bottom: 0; right: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 64px; }
      #b5-root .b5-avatar { width: 232px; height: 232px; border-radius: 56px; background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%); box-shadow: 0 24px 60px rgba(30,64,175,0.35); display: flex; align-items: center; justify-content: center; }
      #b5-root .b5-avatar svg { width: 120px; height: 120px; }
      #b5-root .b5-wf { display: flex; align-items: center; gap: 10px; height: 130px; }
      #b5-root .b5-wf-left { position: absolute; left: 25%; bottom: 96px; transform: translateX(-50%); opacity: 0; }
      #b5-root .b5-wf-right { opacity: 0; }
      #b5-root .b5-bar { width: 12px; height: 110px; border-radius: 6px; transform-origin: 50% 50%; }
      #b5-root .b5-wf-left .b5-bar { background: rgba(255,255,255,0.92); }
      #b5-root .b5-wf-right .b5-bar { background: #1E40AF; }
      #b5-root .b5-splitline { position: absolute; left: 958px; top: 0; width: 4px; height: 1080px; background: linear-gradient(#3B82F6, #1E40AF); transform-origin: 50% 0%; opacity: 0; }
      #b5-root .b5-lines { position: absolute; left: 0; right: 0; top: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; pointer-events: none; }
      #b5-root .b5-line { font-family: "Clash Display", sans-serif; font-weight: 600; font-size: 54px; letter-spacing: -0.02em; color: #FFFFFF; background: rgba(10,10,11,0.52); border-radius: 20px; padding: 20px 38px; opacity: 0; }
      #b5-root .b5-hl { color: #FFFFFF; }
      #b5-root .b5-pulse { position: absolute; left: 960px; top: 540px; width: 26px; height: 26px; border-radius: 50%; background: #3B82F6; box-shadow: 0 0 60px 24px rgba(59,130,246,0.55); transform: translate(-50%, -50%) scale(0); opacity: 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });
        const NB = 22;

        /* deterministic bar patterns (precomputed, no Math.random) */
        const patA = [0.35,0.8,0.55,1.0,0.45,0.7,0.9,0.4,0.65,1.0,0.5,0.75,0.6,0.95,0.4,0.85,0.55,0.7,1.0,0.45,0.8,0.35];
        const patB = [0.9,0.3,0.75,0.4,1.0,0.35,0.6,0.95,0.3,0.7,0.45,1.0,0.4,0.65,0.9,0.35,0.8,0.45,0.6,1.0,0.4,0.7];
        const durA = [0.42,0.55,0.38,0.6,0.47,0.52,0.4,0.58,0.45,0.5,0.43,0.57,0.41,0.54,0.48,0.39,0.56,0.44,0.51,0.46,0.53,0.4];
        const durB = [0.6,0.36,0.52,0.44,0.58,0.4,0.55,0.37,0.5,0.62,0.42,0.48,0.59,0.38,0.53,0.45,0.61,0.39,0.47,0.56,0.43,0.5];

        const wfl = document.getElementById("b5-wfl");
        const wfr = document.getElementById("b5-wfr");
        for (let i = 0; i < NB; i++) {
          const l = document.createElement("div"); l.className = "b5-bar"; l.id = "b5-lb" + i; wfl.appendChild(l);
          const r = document.createElement("div"); r.className = "b5-bar"; r.id = "b5-rb" + i; wfr.appendChild(r);
        }

        /* footage settles in */
        tl.fromTo("#b5-left-inner", { opacity: 0 }, { opacity: 1, duration: 0.9, ease: "sine.out" }, 0);

        /* the split — CleanShot-style vertical wipe at 5.1 */
        tl.fromTo("#b5-right", { clipPath: "inset(0 0 0 100%)" }, { clipPath: "inset(0 0 0 50%)", duration: 0.7, ease: "power3.inOut" }, 5.1);
        tl.to("#b5-left-inner", { x: -252, duration: 0.7, ease: "power3.inOut" }, 5.1);
        tl.fromTo("#b5-splitline", { opacity: 0, scaleY: 0 }, { opacity: 1, scaleY: 1, duration: 0.55, ease: "power2.inOut" }, 5.25);
        tl.fromTo("#b5-avatar", { opacity: 0, scale: 0.82, y: 18 }, { opacity: 1, scale: 1, y: 0, duration: 0.6, ease: "back.out(1.15)", transformOrigin: "50% 60%" }, 5.65);

        /* waveforms appear */
        tl.to("#b5-wfl", { opacity: 1, duration: 0.5, ease: "sine.out" }, 5.7);
        tl.to("#b5-wfr", { opacity: 1, duration: 0.5, ease: "sine.out" }, 5.95);

        /* phase 1 — mismatched rhythms (5.7 → 10.2) */
        for (let i = 0; i < NB; i++) {
          const la = 0.18 + patA[i] * 0.1, ha = 0.25 + patA[i] * 0.75;
          const lb = 0.18 + patB[i] * 0.1, hb = 0.25 + patB[i] * 0.75;
          const rA = Math.max(1, Math.round(4.4 / durA[i]) - 1);
          const rB = Math.max(1, Math.round(4.4 / durB[i]) - 1);
          tl.fromTo("#b5-lb" + i, { scaleY: la }, { scaleY: ha, duration: durA[i], yoyo: true, repeat: rA, ease: "sine.inOut" }, 5.7);
          tl.fromTo("#b5-rb" + i, { scaleY: hb }, { scaleY: lb, duration: durB[i], yoyo: true, repeat: rB, ease: "sine.inOut" }, 5.7);
        }

        /* phase 2 — the right side falls into the same rhythm (10.35 → 15.6) */
        for (let i = 0; i < NB; i++) {
          const la = 0.18 + patA[i] * 0.1, ha = 0.25 + patA[i] * 0.75;
          const reps = Math.max(1, Math.round(5.2 / durA[i]) - 1);
          tl.fromTo("#b5-lb" + i, { scaleY: la }, { scaleY: ha, duration: durA[i], yoyo: true, repeat: reps, ease: "sine.inOut" }, 10.35);
          tl.fromTo("#b5-rb" + i, { scaleY: la }, { scaleY: ha, duration: durA[i], yoyo: true, repeat: reps, ease: "sine.inOut" }, 10.35);
        }

        /* the two lines */
        tl.fromTo("#b5-line1", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 6.3);
        tl.to("#b5-hl1", { color: "#60A5FA", duration: 0.35, ease: "sine.out" }, 7.15);
        tl.to("#b5-line1", { opacity: 0, y: -12, duration: 0.45, ease: "power2.in" }, 8.7);
        tl.set("#b5-line1", { visibility: "hidden" }, 9.2);
        tl.fromTo("#b5-line2", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 9.4);
        tl.to("#b5-hl2", { color: "#60A5FA", duration: 0.35, ease: "sine.out" }, 10.35);

        /* phase 3 — merge into a single blue pulse (15.8 →) */
        tl.to("#b5-line2", { opacity: 0, duration: 0.7, ease: "sine.inOut" }, 15.9);
        for (let i = 0; i < NB; i++) {
          tl.to(["#b5-lb" + i, "#b5-rb" + i], { scaleY: 0.1, opacity: 0.35, duration: 0.9, ease: "power2.inOut" }, 15.8 + i * 0.02);
        }
        tl.to(["#b5-wfl", "#b5-wfr"], { opacity: 0, duration: 0.8, ease: "sine.inOut" }, 17.0);
        tl.to(["#b5-left-inner", "#b5-right", "#b5-avatar", "#b5-splitline"], { opacity: 0.35, duration: 1.6, ease: "sine.inOut" }, 16.4);
        tl.fromTo("#b5-pulse", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7, ease: "back.out(1.3)" }, 16.6);
        tl.fromTo("#b5-pulse", { boxShadow: "0 0 60px 24px rgba(59,130,246,0.55)" }, { boxShadow: "0 0 90px 40px rgba(59,130,246,0.75)", duration: 0.6, yoyo: true, repeat: 2, ease: "sine.inOut" }, 17.2);

        window.__timelines["b5"] = tl;
      })();
    </script>
  </div>
</template>
