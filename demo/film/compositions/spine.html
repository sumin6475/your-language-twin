    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        /* stage fades in from Beat 2's blue (root crossfade) */
        tl.fromTo("#sp-stage", { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "sine.out" }, 0);
        /* aurora drifts for the whole scene */
        tl.fromTo("#sp-aurora", { x: 0 }, { x: -1050, duration: 58.4, ease: "none" }, 0);
        /* frame shadow breathes very slowly */
        tl.fromTo("#sp-frame", { boxShadow: "0 12px 32px rgba(0,0,0,0.10), 0 40px 90px rgba(30,64,175,0.08)" }, { boxShadow: "0 14px 36px rgba(0,0,0,0.12), 0 48px 110px rgba(30,64,175,0.13)", duration: 7.3, yoyo: true, repeat: 7, ease: "sine.inOut" }, 0);

        /* still crossfade: landing hold -> upload card hold */
        tl.fromTo("#st-upload0", { opacity: 0 }, { opacity: 1, duration: 0.6, ease: "sine.inOut" }, 7.95);

        /* swap crossfades for rebuilt screens */
        tl.fromTo("#sw-processing", { opacity: 0, filter: "blur(6px)" }, { opacity: 1, filter: "blur(0px)", duration: 0.7, ease: "power2.out" }, 21.6);
        tl.fromTo("#sw-evidence", { opacity: 0, filter: "blur(7px)" }, { opacity: 1, filter: "blur(0px)", duration: 0.8, ease: "power2.out" }, 50.3);

        /* ---- processing choreography (local seconds) ---- */
        tl.fromTo("#pr-head", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 21.8);
        const agents = ["#ag1", "#ag2", "#ag3", "#ag4"];
        agents.forEach((id, i) => {
          tl.fromTo(id, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.46, ease: "power2.out" }, 22.0 + i * 0.32);
          tl.fromTo(id + "-t", { opacity: 0.55 }, { opacity: 0.55, duration: 0.01, ease: "none" }, 22.0 + i * 0.32);
        });
        tl.fromTo("#conf", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.52, ease: "power2.out" }, 23.35);

        /* slow content drift down the chain (camera feel, HTML-only screen) */
        tl.fromTo("#sp-proc-col", { y: 10, scale: 1.0 }, { y: -26, scale: 1.03, duration: 20.4, ease: "sine.inOut", transformOrigin: "50% 40%" }, 21.8);

        /* dots pulse while the chain runs (finite, seekable) */
        ["#pr-dot1", "#pr-dot2", "#pr-dot3"].forEach((d, i) => {
          tl.fromTo(d, { opacity: 0.45, scale: 1 }, { opacity: 1, scale: 1.25, duration: 0.5, yoyo: true, repeat: 19, ease: "sine.inOut", transformOrigin: "50% 50%" }, 22.0 + i * 0.2);
        });

        /* agent status machine: pending -> spinner -> check */
        const windows = [
          { p: "#ag1", a: 22.6, d: 25.4 },
          { p: "#ag2", a: 25.4, d: 27.9 },
          { p: "#ag3", a: 27.9, d: 30.4 },
          { p: "#ag4", a: 30.4, d: 32.9 },
        ];
        windows.forEach(({ p, a, d }) => {
          const spin = p + "-s", pend = p + "-p", done = p + "-d", txt = p + "-t";
          tl.set(pend, { opacity: 0 }, a);
          tl.set(spin, { opacity: 1 }, a);
          tl.to(txt, { opacity: 1, duration: 0.3, ease: "sine.out" }, a);
          const turns = Math.ceil((d - a) / 0.9);
          tl.fromTo(spin, { rotation: 0 }, { rotation: 360 * turns, duration: d - a, ease: "none", transformOrigin: "50% 50%" }, a);
          tl.set(spin, { opacity: 0 }, d);
          tl.fromTo(done, { opacity: 0, scale: 0.55 }, { opacity: 1, scale: 1, duration: 0.28, ease: "back.out(1.6)", transformOrigin: "50% 50%" }, d);
        });

        /* confidence judge — the money moment, real time */
        tl.set("#cf-p", { opacity: 0 }, 33.4);
        tl.set("#cf-s", { opacity: 1 }, 33.4);
        tl.set("#cf-m1", { opacity: 0 }, 33.4);
