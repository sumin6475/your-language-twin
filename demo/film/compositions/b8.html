<template id="b8-template">
  <div id="b8-root" data-composition-id="b8" data-width="1920" data-height="1080">
    <div class="b8-stage" id="b8-stage">
      <div class="b8-aurora-mask"><div class="b8-aurora-tex" id="b8-aurora"></div></div>

      <div class="b8-world" id="b8-world">
        <!-- orbiting creator network (revealed on pull-back) -->
        <svg class="b8-net" id="b8-net" viewBox="0 0 1920 1080" fill="none">
          <g id="b8-spokes">
            <path class="b8-spoke" d="M960 540 L 960 140" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 1243 257" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 1360 540" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 1243 823" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 960 940" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 677 823" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 560 540" stroke="#3B82F6" stroke-width="2"/>
            <path class="b8-spoke" d="M960 540 L 677 257" stroke="#3B82F6" stroke-width="2"/>
          </g>
        </svg>
        <div class="b8-orbit" id="b8-orbit">
          <span class="b8-sat" style="left:948px; top:128px;"></span>
          <span class="b8-sat" style="left:1231px; top:245px;"></span>
          <span class="b8-sat" style="left:1348px; top:528px;"></span>
          <span class="b8-sat" style="left:1231px; top:811px;"></span>
          <span class="b8-sat" style="left:948px; top:928px;"></span>
          <span class="b8-sat" style="left:665px; top:811px;"></span>
          <span class="b8-sat" style="left:548px; top:528px;"></span>
          <span class="b8-sat" style="left:665px; top:245px;"></span>
        </div>

        <!-- the central pair: learner <-> role model -->
        <div class="b8-pair" id="b8-pair">
          <div class="b8-you" id="b8-you">
            <span class="b8-tile"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="18" r="8" stroke="#fff" stroke-width="3"/><path d="M9 40c2.5-8 8.5-12 15-12s12.5 4 15 12" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg></span>
            <span class="b8-tag">learner</span>
          </div>
          <svg class="b8-both" viewBox="0 0 340 120" fill="none">
            <path id="b8-arc-top" d="M28 74 C 100 18, 240 18, 312 74" stroke="#1E40AF" stroke-width="4" stroke-linecap="round"/>
            <path id="b8-arc-top-head" d="M296 64 L 314 75 L 293 82" stroke="#1E40AF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
            <path id="b8-arc-bot" d="M312 84 C 240 128, 100 128, 28 84" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
            <path id="b8-arc-bot-head" d="M45 96 L 26 83 L 48 78" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="b8-creator" id="b8-creator">
            <span class="b8-tile b8-tile-ct">CT</span>
            <span class="b8-tag">role model</span>
          </div>
        </div>
      </div>

      <!-- real coming-soon vision cards (footage panel) -->
      <div class="b8-panelwrap" id="b8-panelwrap">
        <div class="b8-panel"></div>
      </div>

      <div class="b8-caption" id="b8-caption">Recognition, not recommendation.</div>
      <div class="b8-node" id="b8-node"></div>
    </div>

    <style>
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-500.woff2") format("woff2"); font-weight: 500; font-style: normal; }
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-600.woff2") format("woff2"); font-weight: 600; font-style: normal; }
      @font-face { font-family: "Inter"; src: url("fonts/InterVariable.woff2") format("woff2-variations"); font-weight: 100 900; font-style: normal; }
      #b8-root { position: absolute; inset: 0; background: #FAFAFB; overflow: hidden; }
      #b8-root .b8-stage { position: absolute; inset: 0; }
      #b8-root .b8-aurora-mask { position: absolute; inset: -10px; -webkit-mask-image: radial-gradient(ellipse at 100% 0%, #000 10%, rgba(0,0,0,0) 70%); mask-image: radial-gradient(ellipse at 100% 0%, #000 10%, rgba(0,0,0,0) 70%); }
      #b8-root .b8-aurora-tex { position: absolute; top: -80px; left: 0; width: 5000px; height: 1400px; opacity: 0.44; filter: blur(10px); background-image: repeating-linear-gradient(100deg, #ffffff 0%, #ffffff 7%, rgba(255,255,255,0) 10%, rgba(255,255,255,0) 12%, #ffffff 16%), repeating-linear-gradient(100deg, #1E40AF 10%, #6f8ff5 15%, #a9c0ff 20%, #EFF3FF 25%, #8aa8fa 30%); background-size: 60% 200%; }
      #b8-root .b8-world { position: absolute; inset: 0; transform-origin: 50% 50%; }
      #b8-root .b8-net { position: absolute; inset: 0; width: 100%; height: 100%; }
      #b8-root .b8-spoke { opacity: 0.5; }
      #b8-root .b8-orbit { position: absolute; inset: 0; transform-origin: 960px 540px; }
      #b8-root .b8-sat { position: absolute; width: 64px; height: 64px; margin: -32px 0 0 -32px; border-radius: 50%; background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%); box-shadow: 0 10px 26px rgba(30,64,175,0.28); opacity: 0; }
      #b8-root .b8-pair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 30px; }
      #b8-root .b8-you, #b8-root .b8-creator { display: flex; flex-direction: column; align-items: center; gap: 16px; }
      #b8-root .b8-tile { width: 148px; height: 148px; border-radius: 36px; background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%); box-shadow: 0 18px 44px rgba(30,64,175,0.32); display: flex; align-items: center; justify-content: center; font-family: "Clash Display", sans-serif; font-weight: 600; font-size: 52px; color: #fff; }
      #b8-root .b8-tile svg { width: 74px; height: 74px; }
      #b8-root .b8-tag { font-family: "Clash Display", sans-serif; font-weight: 500; font-size: 22px; letter-spacing: 0.05em; text-transform: uppercase; color: #71717A; }
      #b8-root .b8-both { width: 340px; height: 120px; overflow: visible; }
      #b8-root .b8-panelwrap { position: absolute; right: 90px; top: 110px; opacity: 0; }
      #b8-root .b8-panel { position: relative; width: 720px; height: 429px; border-radius: 18px; overflow: hidden; background: #ffffff; border: 1px solid #ECECF0; box-shadow: 0 12px 32px rgba(0,0,0,0.10), 0 36px 80px rgba(30,64,175,0.10); }
      #b8-root .b8-caption { position: absolute; left: 0; right: 0; bottom: 74px; text-align: center; font-family: "Clash Display", sans-serif; font-weight: 500; font-size: 40px; letter-spacing: -0.01em; color: #18181B; opacity: 0; }
      #b8-root .b8-node { position: absolute; left: 960px; top: 540px; width: 30px; height: 30px; border-radius: 50%; background: #3B82F6; box-shadow: 0 0 70px 30px rgba(59,130,246,0.5); transform: translate(-50%, -50%) scale(0); opacity: 0; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        tl.fromTo("#b8-stage", { opacity: 0 }, { opacity: 1, duration: 1.0, ease: "sine.inOut" }, 0);
        tl.fromTo("#b8-aurora", { x: -300 }, { x: -1150, duration: 27.4, ease: "none" }, 0);

        /* phase A — one learner, one role model */
        tl.fromTo("#b8-world", { scale: 1.18 }, { scale: 1.18, duration: 0.01 }, 0);
        tl.fromTo("#b8-you", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 1.2);
        tl.fromTo("#b8-creator", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, 1.55);
        tl.fromTo("#b8-arc-top", { strokeDasharray: 420, strokeDashoffset: 420 }, { strokeDashoffset: 0, duration: 0.9, ease: "power2.inOut" }, 2.2);
        tl.fromTo("#b8-arc-top-head", { opacity: 0 }, { opacity: 1, duration: 0.25, ease: "sine.out" }, 3.0);

        /* phase B — pull back; the real vision cards drift in */
        tl.to("#b8-world", { scale: 0.86, x: -150, duration: 3.4, ease: "power2.inOut" }, 6.2);
        tl.fromTo("#b8-panelwrap", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "sine.out" }, 6.4);
        tl.to("#b8-panelwrap", { opacity: 0, duration: 0.8, ease: "power2.in" }, 13.8);
        tl.set("#b8-panelwrap", { visibility: "hidden" }, 14.9);

        /* phase C — it runs both ways; the network blossoms */
        tl.fromTo("#b8-arc-bot", { strokeDasharray: 420, strokeDashoffset: 420 }, { strokeDashoffset: 0, duration: 0.9, ease: "power2.inOut" }, 11.2);
        tl.fromTo("#b8-arc-bot-head", { opacity: 0 }, { opacity: 1, duration: 0.25, ease: "sine.out" }, 12.0);
        tl.to("#b8-world", { scale: 0.72, x: 0, duration: 3.6, ease: "power2.inOut" }, 14.6);
        const sats = document.querySelectorAll('#b8-root .b8-sat');
        sats.forEach((s, i) => {
          tl.fromTo(s, { opacity: 0, scale: 0.4 }, { opacity: 1, scale: 1, duration: 0.5, ease: "back.out(1.5)", transformOrigin: "50% 50%" }, 15.2 + i * 0.22);
        });
        tl.fromTo("#b8-spokes path", { strokeDasharray: 440, strokeDashoffset: 440 }, { strokeDashoffset: 0, duration: 1.1, ease: "power2.inOut", stagger: 0.14 }, 15.5);
        /* the loop breathes — one slow orbital drift */
        tl.fromTo("#b8-orbit", { rotation: 0 }, { rotation: 16, duration: 11.0, ease: "sine.inOut" }, 15.2);
        tl.fromTo("#b8-net", { rotation: 0 }, { rotation: 16, duration: 11.0, ease: "sine.inOut", transformOrigin: "50% 50%" }, 15.2);

        /* caption */
        tl.fromTo("#b8-caption", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 10.9);

        /* phase D — the loop contracts to a single glowing node */
        tl.to("#b8-world", { scale: 0.06, opacity: 0, duration: 2.1, ease: "power3.in" }, 25.1);
        tl.to("#b8-caption", { opacity: 0, duration: 0.8, ease: "sine.inOut" }, 25.3);
        tl.fromTo("#b8-node", { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.9, ease: "back.out(1.2)" }, 26.1);

        window.__timelines["b8"] = tl;
      })();
    </script>
  </div>
</template>
