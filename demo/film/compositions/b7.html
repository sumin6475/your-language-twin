    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });

        tl.fromTo("#b7-stage", { opacity: 0 }, { opacity: 1, duration: 0.8, ease: "sine.inOut" }, 0);
        tl.fromTo("#b7-head", { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" }, 0.9);

        /* fast confident whips — each artifact snaps in, holds, recedes */
        const panels = ["#b7-a1", "#b7-a2", "#b7-a3", "#b7-a4", "#b7-a5"];
        const times = [1.9, 4.4, 6.9, 9.4, 11.9];
        panels.forEach((p, i) => {
          const t = times[i];
          tl.fromTo(p,
            { opacity: 0, x: 520, rotationY: 10, filter: "blur(10px)" },
            { opacity: 1, x: 0, rotationY: 0, filter: "blur(0px)", duration: 0.45, ease: "power3.out", transformPerspective: 1200 }, t);
          if (i < panels.length - 1) {
            /* recede under the next arrival */
            tl.to(p, { x: -140 - i * 16, scale: 0.94, opacity: 0.28, filter: "blur(5px)", duration: 0.5, ease: "power2.inOut" }, times[i + 1]);
          }
        });
        /* last artifact recedes into the aurora as B8 fades in over it */
        tl.to("#b7-a5", { scale: 0.92, y: 30, opacity: 0.5, filter: "blur(4px)", duration: 1.3, ease: "power2.inOut" }, 14.4);

        window.__timelines["b7"] = tl;
