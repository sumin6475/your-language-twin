<template id="b1-template">
  <div id="b1-root" data-composition-id="b1" data-width="1920" data-height="1080">
    <div class="b1-stage">
      <div class="b1-glow"></div>
      <div class="b1-stack">
        <div class="b1-line" id="b1-l1">Everyone tells you to learn from native speakers.</div>
        <div class="b1-line" id="b1-l2">We think that's <span class="b1-wrong">wrong<span class="b1-underline" id="b1-wrong-ul"></span></span>.</div>
        <div class="b1-line b1-line-3" id="b1-l3">
          <div>Learn from the native speaker who already</div>
          <div class="b1-key-row"><span class="b1-key">thinks like you</span><span class="b1-dot">.</span>
            <svg class="b1-hand" viewBox="0 0 520 26" fill="none">
              <path id="b1-hand-path" d="M6 16 C 90 8, 180 22, 262 14 S 430 10, 514 17" stroke="#3B82F6" stroke-width="7" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-500.woff2") format("woff2"); font-weight: 500; font-style: normal; }
      @font-face { font-family: "Clash Display"; src: url("fonts/ClashDisplay-600.woff2") format("woff2"); font-weight: 600; font-style: normal; }
      @font-face { font-family: "Inter"; src: url("fonts/InterVariable.woff2") format("woff2-variations"); font-weight: 100 900; font-style: normal; }
      #b1-root { position: absolute; inset: 0; background: #0A0A0B; overflow: hidden; }
      #b1-root .b1-stage { position: absolute; inset: 0; }
      #b1-root .b1-glow { position: absolute; left: 50%; bottom: -420px; width: 1400px; height: 800px; transform: translateX(-50%); background: radial-gradient(closest-side, rgba(30,64,175,0.22), rgba(10,10,11,0)); }
      #b1-root .b1-stack { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 44px; padding: 0 160px; }
      #b1-root .b1-line { font-family: "Clash Display", sans-serif; font-weight: 600; font-size: 62px; letter-spacing: -0.02em; color: #FFFFFF; text-align: center; line-height: 1.18; }
      #b1-root .b1-line-3 { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      #b1-root .b1-key-row { position: relative; display: inline-block; }
      #b1-root .b1-key { color: #3B82F6; }
      #b1-root .b1-wrong { position: relative; display: inline-block; }
      #b1-root .b1-underline { position: absolute; left: 2px; right: 2px; bottom: -6px; height: 7px; border-radius: 4px; background: #3B82F6; transform-origin: left center; }
      #b1-root .b1-hand { position: absolute; left: 50%; bottom: -24px; width: 104%; height: 26px; transform: translateX(-50%); overflow: visible; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      (function () {
        const tl = gsap.timeline({ paused: true });
        const DIM = "#6e6e78";

        /* line 1 — rises in as it is spoken (VO at 0.7) */
        tl.fromTo("#b1-l1", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.46, ease: "power3.out" }, 0.62);

        /* line 2 — previous line dims */
        tl.fromTo("#b1-l2", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 3.98);
        tl.to("#b1-l1", { color: DIM, duration: 0.5, ease: "sine.inOut" }, 4.0);
        /* blue underline wipe under "wrong" */
        tl.fromTo("#b1-wrong-ul", { scaleX: 0 }, { scaleX: 1, duration: 0.34, ease: "power4.out" }, 4.62);

        /* line 3 — the reframe */
        tl.fromTo("#b1-l3", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "expo.out" }, 5.8);
        tl.to("#b1-l2", { color: DIM, duration: 0.5, ease: "sine.inOut" }, 5.85);
        /* hand-drawn accent draws on under "thinks like you" */
        tl.fromTo("#b1-hand-path", { strokeDasharray: 540, strokeDashoffset: 540 }, { strokeDashoffset: 0, duration: 0.62, ease: "power2.inOut" }, 7.5);
        /* key words spring — one settle, small overshoot */
        tl.fromTo(".b1-key", { scale: 0.96 }, { scale: 1, duration: 0.5, ease: "back.out(1.2)", transformOrigin: "50% 80%" }, 7.5);

        /* ambient — glow breathes gently, attached to tl (finite) */
        tl.fromTo(".b1-glow", { opacity: 0.75 }, { opacity: 1, duration: 2.9, yoyo: true, repeat: 3, ease: "sine.inOut" }, 0);

        window.__timelines["b1"] = tl;
      })();
    </script>
  </div>
</template>
